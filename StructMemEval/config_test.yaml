## Quick test — 6 cases, same model split as config.yaml
## Usage: python benchmark.py --config config_test.yaml

# === Memory Systems ===
mem0:
  llm:
    provider: openai
    model: gpt-4o-mini
    api_key: ${OPENAI_API_KEY}
  embedder:
    provider: openai
    model: text-embedding-3-large
    api_key: ${OPENAI_API_KEY}
    embedding_dims: 3072
  vector_db:
    provider: qdrant
    path: ./qdrant_data_test
    embedding_model_dims: 3072

mem_agent:
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  memory_path: memory_test

# === Experiments ===
experiments:
  - name: gpt-4o-retrieval
    model: gpt-4o
    api_key: ${OPENAI_API_KEY}
    data_dirs:
      - benchmark/data/state_machine_location/
    run:
      mem0_rag:
        limits: [5]
        infer: [false]

  - name: gemini-3-flash-agent
    model: google/gemini-3-flash-preview
    api_key: ${LLM_PROVIDER_API_KEY}
    base_url: ${LLM_PROVIDER_BASE_URL}
    data_dirs:
      - benchmark/data/state_machine_location/
    run:
      mem0_agent:
        iterations: 5
        search_limit: 50

  - name: gemini-3-pro-memagent
    model: google/gemini-3-pro-preview
    api_key: ${LLM_PROVIDER_API_KEY}
    base_url: ${LLM_PROVIDER_BASE_URL}
    data_dirs:
      - benchmark/data/state_machine_location/
    run:
      mem_agent: {}

# === Execution ===
max_cases: 6
parallel_workers: 1
auto_clean_memory: true
output_dir: eval_results_test
verbose: false
